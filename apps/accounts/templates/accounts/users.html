{% extends "core/index.html" %}
{% load static %}
{% block content %}
<div class="container my-3">
    <h3 class="yashil">Foydalanuvchilar ro'yxati</h3>
    <form method="get" class="mb-2 d-flex gap-3">
        <input type="text" class="form-control" name="query" value="{{ query }}" placeholder="Qidiruv...">
        <button class="btn btn-primary">Qidirish</button>
    </form>
    <table class="table">
        <thead>
            <tr>
                <th scope="col">#ID</th>
                <th scope="col">First Name</th>
                <th scope="col">Last Name</th>
                <th scope="col">User Name</th>
                <th scope="col">Email</th>
            </tr>
        </thead>
        <tbody>
            {% for user in users %}
            <tr>
                <th scope="row">{{ user.id }}</th>
                <td>{{ user.first_name }}</td>
                <td>{{ user.last_name }}</td>
                <td>@{{ user.username }}</td>
                <td>{{ user.email }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
